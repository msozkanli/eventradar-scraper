version: '3.8'

services:
  scraper:
    build: .
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: .
    command: python scheduler.py
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventradar_dev
      POSTGRES_USER: eventradar
      POSTGRES_PASSWORD: eventradar_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventradar -d eventradar_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
